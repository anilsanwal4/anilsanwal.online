<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anil's Mining Control Centre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #05070d;
    color: #00ffaa;
    overflow: hidden;
}

.header {
    height: 60px;
    background: #000c14;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 25px;
    border-bottom: 1px solid #00ffaa44;
}

.header-right {
    display: flex;
    gap: 10px;
}

button {
    background: #00151f;
    color: #00ffaa;
    border: 1px solid #00ffaa44;
    padding: 6px 12px;
    cursor: pointer;
}

/* GRID WITH SCROLL */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 10px 15px;
    height: calc(100vh - 130px);
    overflow-y: auto;
}

.card {
    background: #0b111b;
    border: 1px solid #00ffaa33;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    height: 300px;
}

.card-title {
    background: #000c14;
    padding: 5px 10px;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
}

iframe {
    flex-grow: 1;
    border: none;
}

/* MODAL */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000000aa;
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: #0b111b;
    padding: 20px;
    border: 1px solid #00ffaa44;
    border-radius: 10px;
    width: 300px;
}

.modal input {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
    background: #00151f;
    border: 1px solid #00ffaa33;
    color: #00ffaa;
}
</style>
</head>
<body>

<div class="header">
    <div>🏢 ANIL's MINING CONTROL CENTRE</div>
    <div class="header-right">
        <button onclick="openModal()">➕ Add Node</button>
        <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>
</div>

<div class="grid" id="dashboardGrid"></div>

<!-- MODAL -->
<div class="modal" id="nodeModal">
    <div class="modal-box">
        <h3>Add New Node</h3>
        <input id="nodeName" placeholder="Node Name">
        <input id="nodeURL" placeholder="http://IP/dashboard">
        <button onclick="addNode()">Add</button>
        <button onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>

let nodes = JSON.parse(localStorage.getItem("nodes")) || [
    { name: "Anil 001", url: "https://a1.naveendahiya.online/dashboard" },
    { name: "Anil 002", url: "http://192.168.0.105/dashboard" }
];

function saveNodes() {
    localStorage.setItem("nodes", JSON.stringify(nodes));
}

function buildGrid() {
    const grid = document.getElementById("dashboardGrid");
    grid.innerHTML = "";

    nodes.forEach((node, index) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="card-title">
                ${node.name}
                <span onclick="removeNode(${index})">❌</span>
            </div>
            <iframe src="${node.url}"></iframe>
        `;

        grid.appendChild(card);
    });
}

/* MODAL */
function openModal() {
    document.getElementById("nodeModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("nodeModal").style.display = "none";
}

function addNode() {
    const name = document.getElementById("nodeName").value;
    const url = document.getElementById("nodeURL").value;

    if (!name || !url) {
        alert("Enter both fields");
        return;
    }

    nodes.push({ name, url });
    saveNodes();
    buildGrid();
    closeModal();
}

/* REMOVE */
function removeNode(index) {
    if (confirm("Delete this node?")) {
        nodes.splice(index, 1);
        saveNodes();
        buildGrid();
    }
}

/* FULLSCREEN */
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

buildGrid();

</script>

</body>
</html>
