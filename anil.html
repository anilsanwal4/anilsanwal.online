<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mining SOC War Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #020409;
    color: #00ffaa;
    overflow: hidden;
}

/* Ultra Dark SOC Background */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
        linear-gradient(rgba(0,255,170,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,170,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    z-index: 0;
}

.header {
    height: 60px;
    background: #00060c;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 25px;
    border-bottom: 1px solid #00ffaa33;
    z-index: 2;
    position: relative;
}

.controls button {
    background: #00151f;
    color: #00ffaa;
    border: 1px solid #00ffaa44;
    padding: 6px 12px;
    margin-left: 10px;
    cursor: pointer;
}

.controls button.active {
    background: #003d4d;
}

.grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
    height: calc(100vh - 70px);
    position: relative;
    z-index: 1;
}

.card {
    background: #050c14;
    border: 1px solid #00ffaa22;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: 0.3s;
}

.card.offline {
    border: 2px solid red;
    animation: blinkRed 1s infinite;
}

@keyframes blinkRed {
    0% { box-shadow: 0 0 5px red; }
    50% { box-shadow: 0 0 20px red; }
    100% { box-shadow: 0 0 5px red; }
}

.card-title {
    background: #00060c;
    padding: 4px 8px;
    font-size: 11px;
    display: flex;
    justify-content: space-between;
}

.status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: red;
}

iframe {
    flex-grow: 1;
    border: none;
    background: #fff;
}
</style>
</head>
<body>

<div class="header">
    <div>🛡 SANWAL'S MINING CONTROL CENTRE</div>
    <div class="controls">
    </div>
</div>

<div class="grid" id="dashboardGrid"></div>

<audio id="alarmSound">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

const nodes = [
  { name: "Anil 001",   url: "https://a1.naveendahiya.online/dashboard"  },
  { name: "Anil 002",   url: "https://a2.anilsanwal.online/dashboard"    },
  { name: "Anil 003",   url: "https://a3.anilsanwal.online/dashboard"    },
  { name: "Anil 004",   url: "https://a4.anilsanwal.online/dashboard"    },
  { name: "Anil 005",   url: "https://a5.anilsanwal.online/dashboard"    },
  { name: "Anil 006",   url: "https://a6.anilsanwal.online/#dashboard"   },
  { name: "Naveen 001", url: "https://n1.naveendahiya.online/dashboard"  },
  { name: "Naveen 002", url: "https://n2.naveendahiya.online/dashboard"  },
  { name: "Naveen 003", url: "https://n3.naveendahiya.online/dashboard"  },
  { name: "Naveen 004", url: "https://n4.naveendahiya.online/dashboard"  },
  { name: "Naveen 005", url: "https://a1.naveendahiya.online/dashboard"  },
  { name: "Manish 001", url: "https://m1.anilsanwal.online/dashboard"    },
];

let silentMode = false;
let autoRefresh = false;
let refreshInterval = null;

function buildGrid() {
    const grid = document.getElementById("dashboardGrid");
    grid.innerHTML = "";

    nodes.forEach((node, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.id = "card" + index;

        card.innerHTML = `
            <div class="card-title">
                ${node.name}
                <div class="status-dot" id="dot${index}"></div>
            </div>
            <iframe id="frame${index}" src="${node.url}" 
                onload="setOnline(${index})"
                onerror="setOffline(${index})">
            </iframe>
        `;
        grid.appendChild(card);
    });
}

function setOnline(index) {
    document.getElementById("dot"+index).style.background = "lime";
    document.getElementById("card"+index).classList.remove("offline");
}

function setOffline(index) {
    document.getElementById("dot"+index).style.background = "red";
    document.getElementById("card"+index).classList.add("offline");
    if(!silentMode) triggerAlarm();
}

function triggerAlarm() {
    document.getElementById("alarmSound").play();
}

function toggleSound() {
    silentMode = !silentMode;
    const btn = document.getElementById("soundBtn");
    btn.textContent = silentMode ? "🔇 Sound OFF" : "🔊 Sound ON";
}

function toggleRefresh() {
    autoRefresh = !autoRefresh;
    const btn = document.getElementById("refreshBtn");

    if(autoRefresh) {
        btn.textContent = "🔄 Auto Refresh ON";
        btn.classList.add("active");
        refreshInterval = setInterval(refreshDashboards, 60000);
    } else {
        btn.textContent = "🔄 Auto Refresh OFF";
        btn.classList.remove("active");
        clearInterval(refreshInterval);
    }
}

function refreshDashboards() {
    nodes.forEach((node, index) => {
        document.getElementById("frame"+index).src = node.url;
    });
}

buildGrid();
document.documentElement.requestFullscreen().catch(()=>{});

</script>

</body>
</html>
